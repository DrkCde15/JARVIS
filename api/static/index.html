<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS Enterprise</title>
<style>
  :root { --primary: #00d4aa; --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  header h1 { color: var(--primary); font-size: 1.5em; }
  header .user-info { display: flex; align-items: center; gap: 12px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .card h2 { color: var(--primary); margin-bottom: 12px; font-size: 1.1em; }
  input, select, textarea, button { background: #0d1117; color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 14px; width: 100%; margin-bottom: 8px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }
  button { background: var(--primary); color: #0d1117; font-weight: 600; cursor: pointer; border: none; padding: 10px 16px; }
  button:hover { opacity: 0.9; }
  button.secondary { background: #21262d; color: var(--text); border: 1px solid var(--border); }
  .btn-sm { padding: 4px 10px; font-size: 12px; width: auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .hidden { display: none !important; }
  .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab-bar button { width: auto; background: transparent; color: var(--text); border: 1px solid var(--border); }
  .tab-bar button.active { background: var(--primary); color: #0d1117; }
  pre { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 12px; overflow-x: auto; font-size: 13px; max-height: 400px; overflow-y: auto; }
  .result-area { margin-top: 12px; }
  .tag { display: inline-block; background: #21262d; border-radius: 12px; padding: 2px 8px; font-size: 11px; margin: 2px; color: var(--primary); }
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; max-width: 400px; z-index: 999; display: none; }
  .toast.show { display: block; }
</style>
</head>
<body>
<div class="container" id="app">
  <header>
    <h1>JARVIS Enterprise</h1>
    <div class="user-info" id="authBar">
      <span id="userName"></span>
      <button class="secondary btn-sm" id="btnLogout" onclick="logout()">Sair</button>
    </div>
  </header>

  <div id="loginView">
    <div class="card" style="max-width:400px;margin:40px auto">
      <h2>Entrar</h2>
      <input type="text" id="loginUser" placeholder="Usuário">
      <input type="password" id="loginPass" placeholder="Senha">
      <button onclick="login()">Entrar</button>
      <p style="text-align:center;margin-top:8px"><a href="#" onclick="showRegister()" style="color:var(--primary)">Criar conta</a></p>
    </div>
    <div class="card hidden" id="registerCard" style="max-width:400px;margin:0 auto">
      <h2>Criar Conta</h2>
      <input type="text" id="regUser" placeholder="Novo usuário">
      <input type="password" id="regPass" placeholder="Senha">
      <input type="password" id="regConfirm" placeholder="Confirmar senha">
      <button onclick="register()">Criar</button>
      <p style="text-align:center;margin-top:8px"><a href="#" onclick="hideRegister()" style="color:var(--primary)">Voltar ao login</a></p>
    </div>
  </div>

  <div id="dashboardView" class="hidden">
    <div class="tab-bar" id="tabBar"></div>

    <div id="tabContent"></div>

    <div id="resultArea" class="card hidden">
      <h2>Resultado</h2>
      <pre id="resultPre"></pre>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/v1';
let TOKEN = localStorage.getItem('jarvis_token') || '';
let USER = localStorage.getItem('jarvis_user') || '';

function _t(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),4000); }

function api(path, opts={}) {
  const h = { 'Content-Type': 'application/json' };
  if (TOKEN) h['Authorization'] = 'Bearer ' + TOKEN;
  if (opts.formData) delete h['Content-Type'];
  return fetch(API+path, { ...opts, headers: h, body: opts.formData || (opts.body ? JSON.stringify(opts.body) : undefined) })
    .then(r => r.json().then(d => r.ok ? d : Promise.reject(d.detail || d.message || 'Erro')));
}

// Auth
function showRegister() { document.getElementById('registerCard').classList.remove('hidden'); }
function hideRegister() { document.getElementById('registerCard').classList.add('hidden'); }

async function login() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  if (!u||!p) return _t('Preencha usuario e senha');
  try {
    const d = await api('/auth/login', { method:'POST', body:{ username:u, password:p } });
    TOKEN = d.access_token; USER = u;
    localStorage.setItem('jarvis_token', TOKEN);
    localStorage.setItem('jarvis_user', USER);
    _t('Login realizado');
    initDashboard();
  } catch(e) { _t('Erro: '+e); }
}

async function register() {
  const u = document.getElementById('regUser').value.trim();
  const p = document.getElementById('regPass').value.trim();
  const c = document.getElementById('regConfirm').value.trim();
  if (p!==c) return _t('Senhas nao conferem');
  try {
    await api('/auth/register', { method:'POST', body:{ username:u, password:p } });
    _t('Conta criada! Faca login.');
    hideRegister();
    document.getElementById('loginUser').value = u;
    document.getElementById('loginPass').value = '';
  } catch(e) { _t('Erro: '+e); }
}

function logout() { TOKEN=''; USER=''; localStorage.removeItem('jarvis_token'); localStorage.removeItem('jarvis_user'); document.getElementById('dashboardView').classList.add('hidden'); document.getElementById('loginView').classList.remove('hidden'); _t('Sessao encerrada'); }

async function showResult(data) {
  const el = document.getElementById('resultArea');
  const pre = document.getElementById('resultPre');
  el.classList.remove('hidden');
  pre.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
}

// Dashboard
function initDashboard() {
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('dashboardView').classList.remove('hidden');
  document.getElementById('userName').textContent = USER;

  const tabs = [
    { id:'rag', label:'RAG', icon:'📄' },
    { id:'documents', label:'Documentos', icon:'📝' },
    { id:'github', label:'GitHub', icon:'🐙' },
    { id:'gitlab', label:'GitLab', icon:'🦊' },
  ];

  const tb = document.getElementById('tabBar');
  tb.innerHTML = tabs.map(t => `<button data-tab="${t.id}" class="${t.id==='rag'?'active':''}" onclick="showTab('${t.id}')">${t.icon} ${t.label}</button>`).join('');
  showTab('rag');
}

function showTab(id) {
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.toggle('active', b.dataset.tab===id));
  const tc = document.getElementById('tabContent');
  document.getElementById('resultArea').classList.add('hidden');
  const fns = { rag:renderRag, documents:renderDocuments, github:renderGitHub, gitlab:renderGitLab };
  (fns[id]||renderRag)();
}

// RAG Tab
function renderRag() {
  const tc = document.getElementById('tabContent');
  tc.innerHTML = `
    <div class="grid">
      <div class="card">
        <h2>Upload</h2>
        <input type="file" id="ragFile" accept=".pdf,.docx,.pptx,.txt,.md">
        <button onclick="uploadRag()">Enviar</button>
      </div>
      <div class="card">
        <h2>Busca Semantica</h2>
        <input type="text" id="ragQuery" placeholder="O que deseja buscar?">
        <button onclick="searchRag()">Buscar</button>
      </div>
    </div>
    <div class="card">
      <h2>Documentos</h2>
      <div id="ragDocList"></div>
      <button class="secondary btn-sm" onclick="listRagDocs()">Atualizar</button>
    </div>
  `;
}

async function uploadRag() {
  const f = document.getElementById('ragFile').files[0];
  if (!f) return _t('Selecione um arquivo');
  const fd = new FormData(); fd.append('file', f);
  try { const d = await api('/rag/upload', { method:'POST', formData:fd }); showResult(d); _t('Upload concluido'); } catch(e) { _t('Erro: '+e); }
}

async function searchRag() {
  const q = document.getElementById('ragQuery').value.trim();
  if (!q) return _t('Digite uma busca');
  try { const d = await api('/rag/search', { method:'POST', body:{ query:q, n_results:5 } }); showResult(d); } catch(e) { _t('Erro: '+e); }
}

async function listRagDocs() {
  try { const d = await api('/rag/documents'); document.getElementById('ragDocList').innerHTML = '<pre>'+JSON.stringify(d,null,2)+'</pre>'; } catch(e) { _t('Erro: '+e); }
}

// Documents Tab
function renderDocuments() {
  const tc = document.getElementById('tabContent');
  tc.innerHTML = `
    <div class="grid">
      <div class="card">
        <h2>Gerar DOCX</h2>
        <input type="text" id="docxTitle" placeholder="Titulo">
        <textarea id="docxContent" rows="4" placeholder='[{"type":"paragraph","text":"Conteudo"}]'></textarea>
        <button onclick="genDocx()">Gerar DOCX</button>
      </div>
      <div class="card">
        <h2>Gerar PDF</h2>
        <input type="text" id="pdfTitle" placeholder="Titulo">
        <textarea id="pdfContent" rows="4" placeholder='[{"type":"paragraph","text":"Conteudo"}]'></textarea>
        <button onclick="genPdf()">Gerar PDF</button>
      </div>
    </div>
    <div class="card">
      <h2>Templates</h2>
      <div id="templateList"></div>
      <button class="secondary btn-sm" onclick="listTemplates()">Listar Templates</button>
      <hr style="margin:12px 0;border-color:var(--border)">
      <input type="text" id="tmplId" placeholder="ID do template">
      <input type="text" id="tmplValues" placeholder='{"cliente":"ACME","produto":"App"}'>
      <select id="tmplFormat"><option value="docx">DOCX</option><option value="pdf">PDF</option><option value="pptx">PPTX</option></select>
      <button onclick="genFromTemplate()">Gerar do Template</button>
    </div>
  `;
}

async function genDocx() {
  try { const d = await api('/documents/docx', { method:'POST', body:{ title:document.getElementById('docxTitle').value, content:JSON.parse(document.getElementById('docxContent').value||'[]') } }); showResult(d); _t('DOCX gerado'); } catch(e) { _t('Erro: '+e); }
}
async function genPdf() {
  try { const d = await api('/documents/pdf', { method:'POST', body:{ title:document.getElementById('pdfTitle').value, content:JSON.parse(document.getElementById('pdfContent').value||'[]') } }); showResult(d); _t('PDF gerado'); } catch(e) { _t('Erro: '+e); }
}
async function listTemplates() {
  try { const d = await api('/documents/templates'); document.getElementById('templateList').innerHTML = d.templates.map(t=>'<span class="tag">'+t.id+': '+t.name+'</span>').join(''); } catch(e) { _t('Erro: '+e); }
}
async function genFromTemplate() {
  try { const d = await api('/documents/templates/generate', { method:'POST', body:{ template_id:document.getElementById('tmplId').value.trim(), valores:JSON.parse(document.getElementById('tmplValues').value||'{}'), format:document.getElementById('tmplFormat').value } }); showResult(d); _t('Documento gerado'); } catch(e) { _t('Erro: '+e); }
}

// GitHub Tab
function renderGitHub() {
  const tc = document.getElementById('tabContent');
  tc.innerHTML = `
    <div class="card">
      <h2>Configurar Token</h2>
      <input type="password" id="ghToken" placeholder="Token GitHub">
      <button onclick="configGithub()">Salvar</button>
    </div>
    <div class="card">
      <h2>Repositorios</h2>
      <button onclick="listRepos()">Listar Repos</button>
      <div id="ghResult"></div>
    </div>
  `;
}
async function configGithub() { try { const d = await api('/github/configure', { method:'POST', body:{ token:document.getElementById('ghToken').value.trim() } }); showResult(d); _t('Token salvo'); } catch(e) { _t('Erro: '+e); } }
async function listRepos() { try { const d = await api('/github/repos'); document.getElementById('ghResult').innerHTML = '<pre>'+JSON.stringify(d,null,2)+'</pre>'; } catch(e) { _t('Erro: '+e); } }

// GitLab Tab
function renderGitLab() {
  const tc = document.getElementById('tabContent');
  tc.innerHTML = `
    <div class="card">
      <h2>Configurar Token</h2>
      <input type="password" id="glToken" placeholder="Token GitLab">
      <input type="text" id="glUrl" placeholder="URL (padrao: https://gitlab.com)" value="https://gitlab.com">
      <button onclick="configGitlab()">Salvar</button>
    </div>
    <div class="card">
      <h2>Projetos</h2>
      <button onclick="listProjects()">Listar Projetos</button>
      <div id="glResult"></div>
    </div>
  `;
}
async function configGitlab() { try { const d = await api('/gitlab/configure', { method:'POST', body:{ token:document.getElementById('glToken').value.trim(), url:document.getElementById('glUrl').value.trim() } }); showResult(d); _t('Token salvo'); } catch(e) { _t('Erro: '+e); } }
async function listProjects() { try { const d = await api('/gitlab/projects'); document.getElementById('glResult').innerHTML = '<pre>'+JSON.stringify(d,null,2)+'</pre>'; } catch(e) { _t('Erro: '+e); } }

// Init
if (TOKEN && USER) { initDashboard(); }
</script>
</body>
</html>
